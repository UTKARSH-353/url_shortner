version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/url_shortener
      - JWT_SECRET=change_me_in_production
      - BASE_URL=http://localhost:5000
      - CLIENT_URL=http://localhost
      - NODE_ENV=production
    depends_on: [mongo]
    ports: ["5000:5000"]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    restart: unless-stopped
    ports: ["80:80"]
    depends_on: [backend]

volumes:
  mongo_data:
